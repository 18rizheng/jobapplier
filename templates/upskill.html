<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Upskill · jobapplier</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#1d1d1f;--gray:#86868b;--bg:#fbfbfd;--surface:#fff;--surface2:#f5f5f7;--line:#e9e9ed;--blue:#0071e3;
  --font:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;letter-spacing:-.011em;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none}
.nav{position:sticky;top:0;background:rgba(251,251,253,.72);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)}
.nav-in{max-width:760px;margin:0 auto;padding:0 28px;height:54px;display:flex;align-items:center}
.nav-in a{color:var(--gray);font-size:14px;font-weight:500}
main{max-width:760px;margin:0 auto;padding:56px 28px 120px}
h1{font-size:40px;font-weight:600;letter-spacing:-.03em;margin-bottom:8px}
.sub{color:var(--gray);font-size:18px;margin-bottom:36px}
.card{background:var(--surface);border-radius:20px;padding:32px 36px;box-shadow:0 1px 2px rgba(0,0,0,.03),0 10px 30px rgba(0,0,0,.05)}
pre{white-space:pre-wrap;font-family:var(--font);font-size:15px;line-height:1.72;color:#2c2c2e}
.reveal{animation:rise .7s cubic-bezier(.16,1,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<nav class="nav"><div class="nav-in"><a href="/">&larr; Pipeline</a></div></nav>
<main>
  <h1 class="reveal">Upskill</h1>
  <div class="sub reveal" style="animation-delay:.05s">What to learn to unlock the most matches.</div>
  <div class="card reveal" style="animation-delay:.1s"><pre>{{ report }}</pre></div>
</main>
</body>
</html>
