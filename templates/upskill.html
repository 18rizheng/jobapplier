<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>upskill — jobapplier</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400..900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#101216;--paper:#e8e4d8;--dim:#8b8fa0;--amber:#f5a524;--line:#2a2f3a;--mono:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--paper);font-family:'IBM Plex Sans',sans-serif;line-height:1.7;padding:40px 0}
.wrap{max-width:780px;margin:0 auto;padding:0 24px}
a{color:var(--amber);text-decoration:none}
.back{font:500 11px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
pre{white-space:pre-wrap;font-family:'IBM Plex Sans';font-size:15px;margin-top:18px}
h1{font-family:'Archivo';font-weight:800;font-size:22px;letter-spacing:.04em;margin:8px 0 4px;color:var(--amber)}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">&larr; back to console</a>
  <h1>Upskill report</h1>
  <pre>{{ report }}</pre>
</div>
</body>
</html>
